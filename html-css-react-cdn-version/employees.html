<!DOCTYPE html>
<html lang="es">
    <head>
        <meta name="description" content="Hola" />
        <meta charset="utf-8" />
        <title>Hola</title>
        <link href="./styles.css" rel="stylesheet" type="text/css" />
        <script type="module" src="./main.js"></script>
        <script type="module" src="./devjobs-avatar-element.js"></script>
    </head>
    <body>
        <header>
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-brackets-angle"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 4l-5 8l5 8" /><path d="M16 4l5 8l-5 8" /></svg>
                DevJobs
            </h1>

            <nav>
                <a href="./index.html">Inicio</a>
                <a href="./employees.html">Empleos</a>
                <a href="">Empresas</a>
                <a href="" rel="noopener nopopover">Salarios</a>
            </nav>

            <div>
                <devjobs-avatar username="martogalde" service="x" size="32"></devjobs-avatar>
                <devjobs-avatar username="rochababyface1" service="x" size="32"></devjobs-avatar>
            </div>
        </header>

        <main>
            <div class="employees-section">
                <h1>Encuentra tu próximo empleo</h1>
                <p>Explora miles de oportunidades en el sector tecnológico</p>

                <form role="search" id="search-form">
                    <div class="search-bar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-search"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg>
                        <input type="text" placeholder="Buscar trabajos, empresas o habilidades">
                    </div>

                    <div class="search-filters">
                        <select id="filter-technology" name="technology">
                            <option value="">Tecnología</option>
                            <optgroup label="Tecnologías populares">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="react">React</option>
                            <option value="nodejs">Node.js</option>
                            </optgroup>
                            <option value="java">Java</option>
                            <hr />
                            <option value="csharp">C#</option>
                            <option value="c">C</option>
                            <option value="c++">C++</option>
                            <hr />
                            <option value="ruby">Ruby</option>
                            <option value="php">PHP</option>
                        </select>
                        <select id="filter-location" name="location">
                            <option value="">Ubicación</option>
                            <option value="remoto">Remoto</option>
                            <option value="cdmx">Ciudad de México</option>
                            <option value="guadalajara">Guadalajara</option>
                            <option value="monterrey">Monterrey</option>
                            <option value="barcelona">Barcelona</option>
                        </select>
                        <select id="filter-level" name="level">
                            <option value="">Nivel de experiencia</option>
                            <option value="junior">Junior</option>
                            <option value="mid">Mid-level</option>
                            <option value="senior">Senior</option>
                            <option value="lead">Lead</option>
                        </select>
                    </div>
                </form>

                <div class="search-results">
                    <h2>Resultados de búsqueda</h2>

                    <div class="search-results-container"></div>

                    <div class="pagination"></div>
                </div>
            </div>
        </main>
        
        <footer>
            <small>
                &copy; 2025 DevJobs. Todos los derechos reservados
            </small>    
        </footer>
       
    </body>
</html>
